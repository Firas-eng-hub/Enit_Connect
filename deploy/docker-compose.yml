# ============================================
# ENIT-Connect Production Docker Compose
# Deploy on Azure VPS with pre-built images
# ============================================

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  db:
    container_name: tic-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: enit_connect
      POSTGRES_USER: enit_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tic-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ==========================================
  # Backend API (pre-built from Docker Hub)
  # ==========================================
  backend:
    container_name: tic-backend
    image: firaskali/enit-connect-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tic-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # Frontend (pre-built from Docker Hub)
  # ==========================================
  frontend:
    container_name: tic-frontend
    image: firaskali/enit-connect-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tic-network
    healthcheck:
      test: [ "CMD", "curl", "-sf", "-H", "User-Agent: docker-healthcheck", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  tic-network:
    driver: bridge
    name: tic-connect-network

volumes:
  postgres_data:
    name: tic-postgres
    driver: local
